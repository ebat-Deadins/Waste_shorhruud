  ctx.fillStyle = c;
  ctx.fillRect(Math.round(ox+rx*P), Math.round(oy+ry*P), Math.round(rw*P), Math.round(rh*P));
}

// ── Audio ──────────────────────────────────────────────────────────
let _actx = null;
function act() {
  if (!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)();
  return _actx;
}
function tone(f1,f2,dur,type='square',vol=0.14){
  try{
    const ac=act(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type; o.frequency.value=f1;
    if(f2) o.frequency.linearRampToValueAtTime(f2, ac.currentTime+dur*0.6);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+dur);
    o.start(); o.stop(ac.currentTime+dur);
  }catch(e){}
}
function sfxPickup(){ tone(480,560,0.08,'square',0.1); }
function sfxDrag(type){
  if(type===HAZARDOUS) tone(120,100,0.12,'sawtooth',0.06);
  else if(type===RECYCLE) tone(380,420,0.08,'square',0.06);
  else tone(260,280,0.08,'triangle',0.06);
}
function sfxDrop(){ tone(300,260,0.12,'square',0.08); }
function sfxCorrect(){
  tone(523,523,0.08,'square',0.14);
  setTimeout(()=>tone(659,659,0.08,'square',0.12),100);
  setTimeout(()=>tone(784,784,0.15,'square',0.1),200);
}
function sfxWrong(){
  tone(200,160,0.18,'sawtooth',0.2);
  setTimeout(()=>tone(140,110,0.25,'sawtooth',0.18),180);
}
function sfxSpawn(){ tone(330,440,0.06,'sine',0.05); }

// ── Game state ────────────────────────────────────────────────────
const MAXWASTES = 8;
let G = {};
function resetGame(){
  G = {
    screen:'title',       // 'title'|'playing'|'gameover'|'info'
    lives:3, score:0,
    correct:0, wrong:0,
    wastes:[], dragging:null,
    mx:W/2, my:H/2,
    hover:-1,
    effects:[],
    lastSpawn:0,
    spawnInt:5000,
    gameOverReason:'',
    lastDragSfx:0,
    fact:'', factTimer:0,
    nid:0,
  };
}
resetGame();

// ── Spawn ─────────────────────────────────────────────────────────
function spawnWaste(){
  if(G.wastes.length >= MAXWASTES) return;
  const def = WASTE_DEFS[Math.floor(Math.random()*WASTE_DEFS.length)];
  const sz  = WSIZES[def.id];
  const pw  = sz.w*P, ph = sz.h*P;
  const margin = 55;
  // avoid middle area if bins are there
  let x = margin + Math.random()*(W-2*margin-pw);
  // keep x away from bins (bottom area not spawn area anyway)
  const yMin = HUD_H + 20;
  const yMax = GROUND_Y - ph - 10;
  const y = yMin + Math.random()*(yMax-yMin);
  G.wastes.push({ id:G.nid++, def, x, y, sz, spawnTime:Date.now() });
  sfxSpawn();
}

// ── Hit tests ─────────────────────────────────────────────────────
function wasteAt(mx,my){
  for(let i=G.wastes.length-1;i>=0;i--){
    const w=G.wastes[i];
    if(mx>=w.x && mx<=w.x+w.sz.w*P && my>=w.y && my<=w.y+w.sz.h*P) return i;
  }
  return -1;
}
function binAt(mx,my){
  for(let i=0;i<BINS.length;i++){
    const b=BINS[i];
    if(mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) return i;
  }
  return -1;
}
function stopBtnHit(mx,my){ return mx>=8&&mx<=92&&my>=10&&my<=42; }
function startBtnHit(mx,my){ return mx>=W/2-120&&mx<=W/2+120&&my>=482&&my<=534; }
function infoBtnHit(mx,my){ return mx>=W-145&&mx<=W-5&&my>=H-60&&my<=H-15; }
function restartBtnHit(mx,my){ return mx>=W/2-145&&mx<=W/2-5&&my>=494&&my<=540; }
function goInfoBtnHit(mx,my){ return mx>=W/2+5&&mx<=W/2+145&&my>=494&&my<=540; }
function backBtnHit(mx,my){ return mx>=W/2-90&&mx<=W/2+90&&my>=H-60&&my<=H-12; }

// ── Input ──────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  G.mx = (e.clientX-r.left)*(W/r.width);
  G.my = (e.clientY-r.top)*(H/r.height);
  if(G.screen==='playing' && G.dragging===null){
    G.hover = wasteAt(G.mx, G.my);
  }
  // drag sound throttled
  if(G.screen==='playing' && G.dragging!==null){
    const now=Date.now();
    if(now - G.lastDragSfx > 350){
      G.lastDragSfx = now;
      sfxDrag(G.wastes[G.dragging.idx]?.def?.bin);
    }
  }
});

canvas.addEventListener('mousedown', e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width);
  const my=(e.clientY-r.top)*(H/r.height);
  try{ act(); }catch(ex){}

  if(G.screen==='title'){
    if(startBtnHit(mx,my)) startGame();
    if(infoBtnHit(mx,my)) G.screen='info';
    return;
  }
  if(G.screen==='gameover'){
    if(restartBtnHit(mx,my)) startGame();
    if(goInfoBtnHit(mx,my)) G.screen='info';
    return;
  }
  if(G.screen==='info'){
    if(backBtnHit(mx,my)) G.screen = G.gameOver ? 'gameover':'title';
    return;
  }
  if(G.screen==='playing'){
    if(stopBtnHit(mx,my)){ G.screen='title'; return; }
    const idx = wasteAt(mx,my);
    if(idx>=0){
      const w=G.wastes[idx];
      G.dragging = { idx, offX:mx-w.x, offY:my-w.y };
      G.hover=-1;
      sfxPickup();
    }
  }
});

canvas.addEventListener('mouseup', e=>{
  if(G.screen!=='playing' || G.dragging===null) return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width);
  const my=(e.clientY-r.top)*(H/r.height);

  const w = G.wastes[G.dragging.idx];
  if(!w){ G.dragging=null; return; }

  const cx = mx - G.dragging.offX + w.sz.w*P/2;
  const cy = my - G.dragging.offY + w.sz.h*P/2;
  const bi = binAt(cx, cy);

  if(bi>=0){
    const bin=BINS[bi];
    if(bin.type===w.def.bin){
      sfxCorrect();
      G.score += 10;
      G.correct++;
      fx(cx, BIN_Y-20, '+10', '#69F0AE');
      fx(cx, BIN_Y+10, '✓ ЗӨВЛӨВ!', '#A5D6A7');
      G.fact = w.def.fact;
      G.factTimer = 220;
      G.wastes.splice(G.dragging.idx, 1);
    } else {
      sfxWrong();
      G.lives--;
      G.wrong++;
      fx(cx, BIN_Y-20, '-1 ♥', '#FF5252');
      fx(cx, BIN_Y+10, '✗ БУРУУ!', '#EF9A9A');
      // put waste back on ground
      w.x = Math.max(10, Math.min(W-w.sz.w*P-10, mx-G.dragging.offX));
      w.y = GROUND_Y - w.sz.h*P - 4;
      if(G.lives<=0){ endGame('Амьд дуусав!'); G.dragging=null; return; }
    }
  } else {
    sfxDrop();
    w.x = Math.max(10, Math.min(W-w.sz.w*P-10, mx-G.dragging.offX));
    w.y = Math.max(HUD_H+5, Math.min(GROUND_Y - w.sz.h*P - 4, my-G.dragging.offY));
  }
  G.dragging=null;
});

// ── Effects ───────────────────────────────────────────────────────
function fx(x,y,text,color){
  G.effects.push({ x,y,text,color, life:70, vy:-1.2 });
}
function updateFx(){
  G.effects = G.effects.filter(e=>e.life>0);
  G.effects.forEach(e=>{ e.life--; e.y+=e.vy; });
  if(G.factTimer>0) G.factTimer--;
}
function drawFx(){
  G.effects.forEach(e=>{
    const a = e.life/70;
    ctx.globalAlpha=a;
    ctx.fillStyle=e.color;
    ctx.font=`bold ${P*2.2}px 'Press Start 2P',monospace`;
    ctx.textAlign='center';
    ctx.fillText(e.text, e.x, e.y);
  });
  ctx.globalAlpha=1;
}

// ── Game flow ─────────────────────────────────────────────────────
function startGame(){
  G.lives=3; G.score=0; G.correct=0; G.wrong=0;
  G.wastes=[]; G.dragging=null; G.effects=[];
  G.lastSpawn=Date.now()-4000;
  G.spawnInt=5000; G.gameOverReason='';
  G.fact=''; G.factTimer=0; G.hover=-1;
  G.screen='playing';
  G.gameOver=false;
  G.nid=0;
}
function endGame(reason){
  G.gameOver=true; G.screen='gameover';
  G.gameOverReason=reason; G.dragging=null;
}

function drawBg(){

  const sk = ctx.createLinearGradient(0,HUD_H,0,GROUND_Y);

  const t = Date.now()/1000;

    const bright = 0.4+0.6*Math.abs(Math.sin(t*0.7+sx));
    ctx.globalAlpha = bright;

const _winState = new Map();
function getBldgColor(bx){ return ['#0D1829','#121E30','#0F1A2B'][bx%3]; }

function drawCity(){
  const t=Date.now()/2500;
  BLDG.forEach((b,bi)=>{
    const by=GROUND_Y-b.h;
    ctx.fillStyle=getBldgColor(bi);
    ctx.fillRect(b.x,by,b.w,b.h);
    // pixel scanlines
    ctx.fillStyle='rgba(0,0,0,0.25)';
    for(let gy=0;gy<b.h;gy+=8) ctx.fillRect(b.x,by+gy,b.w,1);

    b.win.forEach(([wx,wy])=>{

      if(!_winState.has(key)) _winState.set(key,Math.random());
      const seed=_winState.get(key);
      const lit = Math.sin(t+seed*10) > -0.3;
      ctx.fillStyle = lit ? '#FFD54F' : '#081220';
      ctx.fillRect(b.x+wx, by+wy, 13, 10);
      if(lit){
        ctx.fillStyle='rgba(255,213,79,0.25)';
        ctx.fillRect(b.x+wx-2,by+wy-2,17,14);

// ── Drawing: Bins ────────────────────────────────────────────────
function drawBins(){
  BINS.forEach((b,i)=>{
    const {x,y,w,h}=b;

    // glow
    const rg=ctx.createRadialGradient(x+w/2,y+h/2,10,x+w/2,y+h/2,w*0.9);
    rg.addColorStop(0,b.glow);
    rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg; ctx.fillRect(x-20,y-20,w+40,h+40);

    // shadow
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(x+5,y+5,w,h);

    // body
    ctx.fillStyle=b.dark; ctx.fillRect(x,y,w,h);
    ctx.fillStyle=b.mid;  ctx.fillRect(x+3,y+3,w-6,h-6);

    // horizontal texture lines
    for(let ly=y+6;ly<y+h-3;ly+=14){
      ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(x+3,ly,w-6,2);
    }

    // highlight side
    ctx.fillStyle='rgba(255,255,255,0.07)';
    ctx.fillRect(x+3,y+3,6,h-6);

    // lid
    ctx.fillStyle=b.lid; ctx.fillRect(x,y,w,26);
    ctx.fillStyle=b.mid; ctx.fillRect(x+3,y+4,w-6,18);

    // slot
    ctx.fillStyle=b.slot; ctx.fillRect(x+w/2-22,y+7,44,12);
    // slot shine
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(x+w/2-20,y+8,44,4);

    // pixel border
    ctx.fillStyle=b.light;
    ctx.fillRect(x,y,2,h);
    ctx.fillRect(x+w-2,y,2,h);
    ctx.fillRect(x,y,w,2);
    ctx.fillRect(x,y+h-2,w,2);

    // icon
    drawBinIcon(b, x+w/2, y+60);

    // label
    ctx.textAlign='center';
    ctx.font=`bold ${P*1.7}px 'Press Start 2P',monospace`;
    ctx.fillStyle='rgba(0,0,0,0.8)';
    ctx.fillText(b.label, x+w/2+1, y+h-12+1);
    ctx.fillStyle='#FFFFFF';
    ctx.fillText(b.label, x+w/2, y+h-12);
  });
}

function drawBinIcon(b,cx,cy){
  const c=b.light;
  if(b.type===RECYCLE){
    ctx.fillStyle=c;
    // simplified recycle arrows (3 bent arrows pixel-art)
    [[0,-16,20,4],[10,8,-12,16],[-10,8,-8,-20]].forEach(([ax,ay,bx,by])=>{
      ctx.fillRect(cx+ax-2,cy+ay,8,4);
      ctx.fillRect(cx+ax,cy+ay,4,8);
    });
    ctx.fillStyle=b.light;
    ctx.strokeStyle=b.light; ctx.lineWidth=3;
    // draw proper recycle symbol
    ctx.beginPath();
    ctx.arc(cx,cy,14,0,Math.PI*2*0.33);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx,cy,14,Math.PI*2/3,Math.PI*4/3);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx,cy,14,Math.PI*4/3,Math.PI*2);
    ctx.stroke();
  } else if(b.type===GENERAL){
    ctx.fillStyle=c;
    ctx.fillRect(cx-13,cy-8,26,20);
    ctx.fillRect(cx-16,cy-14,32,8);
    ctx.fillRect(cx-9,cy-18,18,6);
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(cx-7,cy-8,5,20);
    ctx.fillRect(cx+2,cy-8,5,20);
  } else {
    // hazard triangle pixel
    ctx.fillStyle='#FFEB3B';
    ctx.beginPath();
    ctx.moveTo(cx,cy-18); ctx.lineTo(cx+18,cy+12); ctx.lineTo(cx-18,cy+12);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#212121';
    ctx.font=`bold ${P*3}px Arial`;
    ctx.textAlign='center';
    ctx.fillText('!',cx,cy+10);
  }
}

// ── Drawing: Wastes ───────────────────────────────────────────────
function drawWastes(){
  const t=Date.now()/1000;
  G.wastes.forEach((w,i)=>{
    if(G.dragging && G.dragging.idx===i) return;
    const age=(Date.now()-w.spawnTime)/1000;
    const hov=(G.hover===i);

    // age warning flash
    if(age>12){
      const fl=Math.sin(Date.now()/250)>0;
      if(fl){ ctx.fillStyle='rgba(255,30,30,0.18)';
        ctx.fillRect(w.x-5,w.y-5,w.sz.w*P+10,w.sz.h*P+10); }
    }

    // shadow
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(w.x+4,w.y+5,w.sz.w*P,w.sz.h*P);

    // draw pixel art
    if(ART[w.def.id]) ART[w.def.id](w.x,w.y);

    // hover outline
    if(hov){
      ctx.strokeStyle='#FFD700'; ctx.lineWidth=2.5;
      ctx.strokeRect(w.x-4,w.y-4,w.sz.w*P+8,w.sz.h*P+8);
      drawTooltip(w.def.name, w.x+w.sz.w*P/2, w.y-14);
    }
  });

  // Draw dragged item
  if(G.dragging!==null){
    const w=G.wastes[G.dragging.idx];
    if(w){
      const dx=G.mx-G.dragging.offX, dy=G.my-G.dragging.offY;
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.fillRect(dx+6,dy+7,w.sz.w*P,w.sz.h*P);
      if(ART[w.def.id]) ART[w.def.id](dx,dy);
      drawTooltip(w.def.name, dx+w.sz.w*P/2, dy-14);

      // highlight matching bin
      const cx=dx+w.sz.w*P/2, cy=dy+w.sz.h*P/2;
      BINS.forEach(b=>{
        if(b.type===w.def.bin){
          ctx.strokeStyle=b.light; ctx.lineWidth=3;
          ctx.setLineDash([6,4]);
          ctx.strokeRect(b.x-3,b.y-3,b.w+6,b.h+6);
          ctx.setLineDash([]);
        }
      });
    }
  }
}

function drawTooltip(txt,cx,cy){
  ctx.font=`${P*1.5}px 'Press Start 2P',monospace`;
  const tw=ctx.measureText(txt).width;
  const tx=Math.max(5,Math.min(W-tw-14,cx-tw/2-7));
  const ty=Math.max(HUD_H+5,cy-26);
  ctx.fillStyle='rgba(5,15,35,0.92)'; ctx.fillRect(tx,ty,tw+14,24);
  ctx.fillStyle='#D4A017'; ctx.fillRect(tx,ty,tw+14,2);
  ctx.fillStyle='#FFFFFF'; ctx.textAlign='left';
  ctx.fillText(txt,tx+7,ty+17);
  ctx.textAlign='center';
}

// ── Drawing: Crosshair ────────────────────────────────────────────
function drawCrosshair(){
  const {mx,my}=G, size=18, gap=6;
  ctx.strokeStyle='#FF1744'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(mx,my,11,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx,my-gap); ctx.lineTo(mx,my-size); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx,my+gap); ctx.lineTo(mx,my+size); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx-gap,my); ctx.lineTo(mx-size,my); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx+gap,my); ctx.lineTo(mx+size,my); ctx.stroke();
  ctx.fillStyle='#FF1744'; ctx.fillRect(mx-1.5,my-1.5,3,3);
  // Mongolian ornament corners
  ctx.strokeStyle='#D4A017'; ctx.lineWidth=1.5;
  const co=22;
  [[mx-co,my-co],[mx+co-5,my-co],[mx-co,my+co-5],[mx+co-5,my+co-5]].forEach(([ox,oy])=>{
    ctx.strokeRect(ox,oy,5,5);
  });
}

  ctx.fillText(`✓ Зөв ангилсан: ${G.correct}`,W/2,348);
  ctx.fillStyle='#FF5252';
  ctx.fillText(`✗ Буруу ангилсан: ${G.wrong}`,W/2,374);

  // Hazardous info banner
  ctx.fillStyle='rgba(50,25,0,0.85)'; ctx.fillRect(W/2-330,410,660,80);
  ctx.strokeStyle='#FF8F00'; ctx.lineWidth=1.5; ctx.strokeRect(W/2-330,410,660,80);
  ctx.fillStyle='#FFB300';
  ctx.font=`${P*1.3}px 'Press Start 2P',monospace`;
  ctx.fillText('⚠  АЮУЛТАЙ ХОГ ТУХАЙ',W/2,435);
  ctx.fillStyle='#ECEFF1';
  ctx.font=`${P*1.1}px 'Press Start 2P',monospace`;
  ctx.fillText('Тэсрэмтгий, шатамхай, хортой бодисыг тусгай',W/2,458);
  ctx.fillText('зөвшөөрөл бүхий байгууллагаар устгуулна.',W/2,476);

  // Buttons
  ctx.fillStyle='#7B5200'; ctx.fillRect(W/2-145,494,140,48);
  ctx.fillStyle='#C9820A'; ctx.fillRect(W/2-143,496,136,44);
  ctx.fillStyle='#0A1628';
  ctx.font=`${P*1.5}px 'Press Start 2P',monospace`;
  ctx.fillText('↺  ДАХИН',W/2-75,525);

  ctx.fillStyle='#0A2A6E'; ctx.fillRect(W/2+5,494,140,48);
  ctx.fillStyle='#1155CC'; ctx.fillRect(W/2+7,496,136,44);
  ctx.fillStyle='#FFFFFF';
  ctx.fillText('ℹ  МЭДЭЭЛЭЛ',W/2+75,525);
}

function drawInfo(){
  ctx.fillStyle='rgba(4,10,24,0.97)'; ctx.fillRect(0,0,W,H);

  ctx.textAlign='center';
  ctx.font=`bold ${P*2.4}px 'Press Start 2P',monospace`;
  ctx.fillStyle='#FF5722';
  ctx.fillText('⚠  АЮУЛТАЙ ХОГ ХАЯГДАЛ',W/2,55);

  const rows=[
    {t:'Аюултай хог гэж юу вэ?', c:'#FFB300', sz:1.8, bold:true},
    {t:'Хүний эрүүл мэнд, байгаль орчинд хор хөнөөл',   c:'#ECEFF1',sz:1.25},
    {t:'учруулдаг бодисуудыг хэлнэ:',   c:'#ECEFF1',sz:1.25},
    {t:'• Тэсрэмтгий  • Шатамхай  • Идэмхий',  c:'#FF8A65',sz:1.25},
    {t:'• Исэлдүүлэгч  • Хортой бодисууд',      c:'#FF8A65',sz:1.25},
    {t:'Хаана өгөх вэ?', c:'#FFB300',sz:1.8,bold:true},
    {t:'► Зай батерей  →  Дэлгүүр, цэнэглэх газрын цэг', c:'#A5D6A7',sz:1.2},
    {t:'► Хуучин эм  →  Эмийн санд буцааж өгнө',          c:'#A5D6A7',sz:1.2},
    {t:'► Будаг, химийн бодис  →  Тусгай цуглуулах цэг',  c:'#A5D6A7',sz:1.2},
    {t:'► Машины тос  →  Автосервис, тусгай цэгт',          c:'#A5D6A7',sz:1.2},
    {t:'► Флюресцент чийдэн  →  Тусгай цуглуулах цэгт',   c:'#A5D6A7',sz:1.2},
    {t:'Монгол Улсад аюултай хогийг устгах тусгай', c:'#90CAF9',sz:1.15},
    {t:'журам, зөвшөөрөл бүхий байгууллагууд ажилладаг.',c:'#90CAF9',sz:1.15},
    {t:'УБЦТС / Хотын хог хаягдлын удирдлагын газар', c:'#B39DDB',sz:1.15},
    {t:'Утас: 7011-7007  ·  1800-ХОГХАЯГ',               c:'#B39DDB',sz:1.15},
  ];

  let ry=90;
  rows.forEach(r=>{
    ctx.fillStyle=r.c;
    ctx.font=`${r.bold?'bold ':''} ${P*r.sz}px 'Press Start 2P',monospace`;
    ctx.fillText(r.t,W/2,ry);
    ry += r.bold ? 36 : 24;
  });

  // Bin key
  const bkeys=[{c:'#1155CC',t:'ДАХИВАР'},{c:'#2E7D32',t:'ЭНГИЙН'},{c:'#B71C1C',t:'АЮУЛТАЙ'}];
  bkeys.forEach((b,i)=>{
    ctx.fillStyle=b.c; ctx.fillRect(W/2-175+i*120,H-90,110,28);
    ctx.fillStyle='#FFF';
    ctx.font=`${P*1.1}px 'Press Start 2P',monospace`;
    ctx.fillText(b.t,W/2-120+i*120,H-70);
  });

  // back button
  ctx.fillStyle='#7B5200'; ctx.fillRect(W/2-90,H-52,180,44);
  ctx.fillStyle='#C9820A'; ctx.fillRect(W/2-88,H-50,176,40);
  ctx.fillStyle='#0A1628';
  ctx.font=`${P*1.7}px 'Press Start 2P',monospace`;
  ctx.fillText('← БУЦАХ',W/2,H-22);
}

// ── Main loop ─────────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,W,H);
  drawBg();

  if(G.screen==='title'){
    drawTitleScreen();
  } else if(G.screen==='playing'){
    // spawn logic
    const now=Date.now();
    if(now-G.lastSpawn > G.spawnInt){
      G.lastSpawn=now;
      if(G.wastes.length < MAXWASTES) spawnWaste();
      else endGame('Хог хэтэрхий хуримтлагдлаа!');
      G.spawnInt = Math.max(2200, G.spawnInt - 80);
    }
    drawBins();
    drawWastes();
    updateFx(); drawFx();
    drawHUD();
  } else if(G.screen==='gameover'){
    drawGameOver();
  } else if(G.screen==='info'){
    drawInfo();
  }

  drawCrosshair();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
